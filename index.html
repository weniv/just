<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>딱 필요한 만큼 — 실습장</title>
  <meta name="description" content="바이브 코딩에 필요한 도구를 30분 안에 익힐 수 있도록, 위니브가 만든 단편 실습장입니다." />
  <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="./hub.css" />
</head>
<body class="hub-page">
  <header class="topbar">
    <a class="brand" href="./" aria-label="딱 필요한 만큼 — 바이브 코딩 실습장 홈">
      <img src="./logo.svg" alt="weniv" class="brand-logo" />
      <span class="divider" aria-hidden="true"></span>
      <span class="title">바이브 코딩 실습장</span>
    </a>

    <div class="actions">
      <label class="theme-toggle">
        <input type="checkbox" id="themeToggle" />
        <span>다크</span>
      </label>
    </div>
  </header>

  <main class="hub-main">
    <section class="hero">
      <h1>한 가지 도구를 <em>딱 필요한 만큼</em> 익히기</h1>
      <p>
        AI와 함께 코딩하다 막히는 지점을 빠르게 채우는 단편 실습장 모음입니다.
        주제를 골라 좌측에 입력하면 우측에 결과가 표시됩니다.
      </p>
    </section>

    <section class="book-grid" id="bookGrid" aria-label="책 목록"></section>

    <section class="hub-footer">
      <p>
        시리즈 도서 <a href="https://www.books.weniv.co.kr/" target="_blank" rel="noopener">위니북스</a>
        · 제작 <a href="https://weniv.co.kr/" target="_blank" rel="noopener">위니브</a>
      </p>
    </section>
  </main>

  <script src="./books.js"></script>
  <script src="./script.js"></script>
</body>
</html>
