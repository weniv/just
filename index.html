<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>딱 필요한 만큼 — 실습장</title>
  <meta name="description" content="바이브 코딩에 필요한 도구를 30분 안에 익힐 수 있도록, 위니브가 만든 단편 실습장입니다." />
  <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="./hub.css" />
</head>
<body class="hub-page">
  <header class="topbar">
    <div class="brand">
      <a class="brand-logo-link" href="https://www.weniv.co.kr/" target="_blank" rel="noopener" aria-label="위니브 홈으로 이동">
        <img src="./logo.svg" alt="weniv" class="brand-logo" />
      </a>
      <span class="divider" aria-hidden="true"></span>
      <a class="brand-title-link" href="./" aria-label="딱 필요한 만큼 — 바이브 코딩 실습장 홈">
        <span class="title">바이브 코딩 실습장</span>
      </a>
    </div>

    <div class="actions">
      <label class="theme-toggle">
        <input type="checkbox" id="themeToggle" />
        <span>다크</span>
      </label>
    </div>
  </header>

  <main class="hub-main">
    <section class="hero">
      <h1>한 가지 도구를 <em>딱 필요한 만큼</em> 익히기</h1>
      <p>
        AI와 함께 코딩하다 막히는 지점을 빠르게 채우는 단편 실습장 모음입니다.
        주제를 골라 좌측에 입력하면 우측에 결과가 표시됩니다.
      </p>
    </section>

    <section class="book-grid" id="bookGrid" aria-label="책 목록"></section>
  </main>

  <footer class="site-footer">
    <div class="site-footer-inner">
      <div class="site-footer-brand">
        <a href="https://www.weniv.co.kr/" target="_blank" rel="noopener" aria-label="위니브 홈으로 이동">
          <img src="./logo.svg" alt="weniv" class="site-footer-logo" />
        </a>
        <p class="site-footer-tagline">
          한 가지 도구를 30분 안에 익히는 단편 실습장 모음입니다.
        </p>
      </div>

      <nav class="site-footer-links" aria-label="관련 사이트">
        <h2>관련 사이트</h2>
        <ul>
          <li><a href="https://weniv.co.kr/" target="_blank" rel="noopener">위니브</a></li>
          <li><a href="https://www.books.weniv.co.kr/" target="_blank" rel="noopener">위니북스</a></li>
          <li><a href="https://github.com/weniv" target="_blank" rel="noopener">GitHub</a></li>
        </ul>
      </nav>

      <div class="site-footer-copy">
        <p>© WENIV. All rights reserved.</p>
        <p class="site-footer-meta">딱 필요한 만큼 — 바이브 코딩 실습장</p>
      </div>
    </div>
  </footer>

  <script src="./books.js"></script>
  <script src="./script.js"></script>

</html>
